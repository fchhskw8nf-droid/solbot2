<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SOL BOT v2 · Multi-Position</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #05080f;
  --surface: #080d1a;
  --border: #0f1e35;
  --accent: #0ff;
  --accent2: #7b2fff;
  --green: #00ff88;
  --red: #ff2d55;
  --gold: #ffd700;
  --text: #b8d4f0;
  --muted: #2a4060;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 40% at 50% -20%, rgba(123,47,255,0.12), transparent),
    radial-gradient(ellipse 60% 30% at 80% 80%, rgba(0,255,255,0.05), transparent);
  pointer-events: none;
  z-index: 0;
}
.wrap { position:relative; z-index:1; max-width:500px; margin:0 auto; padding:20px 16px 60px; }

/* Header */
.header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.logo { font-family:'Orbitron',sans-serif; font-size:1.4rem; font-weight:900; letter-spacing:.1em; color:#fff; }
.logo span { color:var(--accent); }
.v2-badge { background:linear-gradient(135deg,var(--accent2),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; font-family:'Orbitron',sans-serif; font-size:.7rem; font-weight:700; letter-spacing:.2em; }
.live-pill { display:flex; align-items:center; gap:6px; background:var(--surface); border:1px solid var(--border); padding:5px 12px; border-radius:20px; font-family:'JetBrains Mono',monospace; font-size:.65rem; }
.live-dot { width:6px; height:6px; border-radius:50%; background:var(--muted); }
.live-dot.on { background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Portfolio card */
.portfolio-card {
  background: linear-gradient(135deg, #080d1a, #05080f);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.portfolio-card::before {
  content: '';
  position: absolute;
  top: -1px; left: -1px; right: -1px; bottom: -1px;
  background: linear-gradient(135deg, rgba(0,255,255,.15), transparent 40%, rgba(123,47,255,.1) 100%);
  border-radius: 16px;
  pointer-events: none;
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask-composite: exclude;
  padding: 1px;
}
.port-label { font-family:'JetBrains Mono',monospace; font-size:.6rem; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
.port-value { font-family:'Orbitron',sans-serif; font-size:2.8rem; font-weight:900; color:#fff; line-height:1; }
.port-value span { font-size:1.1rem; color:var(--accent); margin-left:4px; }
.port-pnl { margin-top:8px; font-family:'JetBrains Mono',monospace; font-size:.8rem; }
.up { color:var(--green); } .dn { color:var(--red); }
.port-meta { margin-top:12px; display:flex; gap:16px; }
.port-meta-item { font-family:'JetBrains Mono',monospace; font-size:.65rem; color:var(--muted); }
.port-meta-item span { color:var(--text); display:block; font-size:.75rem; margin-top:2px; }

/* Scan bar */
.scan-wrap { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
.scan-label { font-family:'JetBrains Mono',monospace; font-size:.6rem; color:var(--muted); white-space:nowrap; }
.scan-track { flex:1; height:2px; background:var(--border); border-radius:1px; }
.scan-fill { height:100%; background:linear-gradient(90deg,var(--accent2),var(--accent)); border-radius:1px; transition:width linear 1s; }
.scan-time { font-family:'JetBrains Mono',monospace; font-size:.65rem; color:var(--accent); min-width:28px; text-align:right; }

/* Positions grid */
.section-label { font-family:'JetBrains Mono',monospace; font-size:.6rem; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
.slot-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.slot { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px; min-height:100px; position:relative; }
.slot.active { border-color:rgba(0,255,255,.3); box-shadow:0 0 16px rgba(0,255,255,.06); }
.slot.empty { display:flex; align-items:center; justify-content:center; border-style:dashed; opacity:.4; }
.slot-num { font-family:'JetBrains Mono',monospace; font-size:.55rem; color:var(--muted); margin-bottom:6px; }
.slot-token { font-family:'Orbitron',sans-serif; font-size:1rem; font-weight:700; color:var(--accent); margin-bottom:8px; }
.slot-pnl { font-family:'JetBrains Mono',monospace; font-size:.85rem; font-weight:600; }
.slot-detail { font-family:'JetBrains Mono',monospace; font-size:.6rem; color:var(--muted); margin-top:4px; }
.slot-z { position:absolute; bottom:10px; right:10px; font-family:'JetBrains Mono',monospace; font-size:.65rem; color:var(--accent2); }
.empty-text { font-family:'JetBrains Mono',monospace; font-size:.65rem; color:var(--muted); }

/* Stats row */
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:16px; }
.stat { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 12px; text-align:center; }
.stat-label { font-family:'JetBrains Mono',monospace; font-size:.55rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:4px; }
.stat-value { font-family:'JetBrains Mono',monospace; font-size:.85rem; color:var(--text); }
.stat-value.c { color:var(--accent); }
.stat-value.g { color:var(--green); }
.stat-value.r { color:var(--red); }

/* Signals */
.signal-list { display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
.signal-row { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 14px; display:flex; align-items:center; justify-content:space-between; }
.signal-row.best { border-color:rgba(0,255,255,.3); }
.signal-row.held { border-color:rgba(255,215,0,.2); }
.signal-name { font-family:'Orbitron',sans-serif; font-size:.9rem; font-weight:700; }
.signal-badges { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.badge { font-family:'JetBrains Mono',monospace; font-size:.58rem; padding:2px 7px; border-radius:6px; }
.badge.z-neg { background:rgba(0,255,136,.1); color:var(--green); border:1px solid rgba(0,255,136,.2); }
.badge.z-pos { background:rgba(255,45,85,.1); color:var(--red); border:1px solid rgba(255,45,85,.2); }
.badge.z-neu { background:rgba(42,64,96,.4); color:var(--muted); border:1px solid var(--border); }
.badge.held { background:rgba(255,215,0,.1); color:var(--gold); border:1px solid rgba(255,215,0,.2); }
.signal-score { font-family:'JetBrains Mono',monospace; font-size:.75rem; min-width:60px; text-align:right; }

/* Equity chart */
.chart-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:16px; }
canvas { width:100%!important; height:80px!important; }

/* Trades */
.trade-item { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 14px; display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.trade-left { display:flex; align-items:center; gap:10px; }
.trade-badge { font-family:'JetBrains Mono',monospace; font-size:.6rem; padding:3px 8px; border-radius:6px; letter-spacing:.08em; }
.trade-badge.buy { background:rgba(0,255,136,.1); color:var(--green); border:1px solid rgba(0,255,136,.25); }
.trade-badge.sell { background:rgba(255,45,85,.1); color:var(--red); border:1px solid rgba(255,45,85,.25); }
.trade-token { font-family:'JetBrains Mono',monospace; font-size:.8rem; }
.trade-time { font-family:'JetBrains Mono',monospace; font-size:.58rem; color:var(--muted); }
.trade-pnl { font-family:'JetBrains Mono',monospace; font-size:.75rem; }

/* Log */
.log-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:16px; }
.log-text { font-family:'JetBrains Mono',monospace; font-size:.68rem; color:var(--muted); line-height:1.8; word-break:break-all; }
.log-ts { color:rgba(0,255,255,.3); }

/* Toast */
.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-80px); background:var(--surface); border:1px solid var(--accent); border-radius:12px; padding:10px 20px; font-family:'JetBrains Mono',monospace; font-size:.75rem; color:var(--accent); z-index:999; transition:transform .4s; box-shadow:0 4px 20px rgba(0,255,255,.15); white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.sell { border-color:var(--red); color:var(--red); }
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="wrap">

  <div class="header">
    <div>
      <div class="logo">SOL<span>BOT</span></div>
      <div class="v2-badge">MULTI-POSITION v2</div>
    </div>
    <div class="live-pill"><div class="live-dot" id="dot"></div><span id="statusTxt">CONNECTING</span></div>
  </div>

  <!-- Scan bar -->
  <div class="scan-wrap">
    <div class="scan-label">NEXT SCAN</div>
    <div class="scan-track"><div class="scan-fill" id="scanFill" style="width:0%"></div></div>
    <div class="scan-time" id="scanTime">—</div>
  </div>

  <!-- Portfolio -->
  <div class="portfolio-card">
    <div class="port-label">Total Portfolio Value</div>
    <div class="port-value" id="portVal">—<span>SOL</span></div>
    <div class="port-pnl" id="portPnl">Loading...</div>
    <div class="port-meta">
      <div class="port-meta-item">Liquid SOL<span id="liquidSol">—</span></div>
      <div class="port-meta-item">In Positions<span id="inPositions">—</span></div>
      <div class="port-meta-item">Total P&L<span id="totalPnl">—</span></div>
    </div>
  </div>

  <!-- Positions -->
  <div class="section-label">
    <span>Active Positions</span>
    <span id="slotCount" style="color:var(--accent);font-size:.65rem;">0/4</span>
  </div>
  <div class="slot-grid" id="slotGrid">
    <div class="slot empty"><div class="empty-text">SLOT 1</div></div>
    <div class="slot empty"><div class="empty-text">SLOT 2</div></div>
    <div class="slot empty"><div class="empty-text">SLOT 3</div></div>
    <div class="slot empty"><div class="empty-text">SLOT 4</div></div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat"><div class="stat-label">Trades</div><div class="stat-value c" id="tradeCount">—</div></div>
    <div class="stat"><div class="stat-label">Win Rate</div><div class="stat-value g" id="winRate">—</div></div>
    <div class="stat"><div class="stat-label">Best</div><div class="stat-value g" id="bestTrade">—</div></div>
    <div class="stat"><div class="stat-label">Losses</div><div class="stat-value r" id="lossStreak">—</div></div>
  </div>

  <!-- Equity -->
  <div class="section-label">Portfolio History</div>
  <div class="chart-card"><canvas id="chart"></canvas></div>

  <!-- Signals -->
  <div class="section-label">Signal Scan</div>
  <div class="signal-list" id="signalList"><div style="font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted);text-align:center;padding:20px;">Waiting for scan...</div></div>

  <!-- Trades -->
  <div class="section-label">Recent Trades</div>
  <div id="tradeList"><div style="font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted);text-align:center;padding:20px;">No trades yet</div></div>

  <!-- Log -->
  <div class="section-label">Last Action</div>
  <div class="log-card"><div class="log-text" id="logText">—</div></div>

</div>
<script>
const BACKEND = window.location.origin;
const REFRESH = 15000;
const SCAN_INTERVAL = 180;
let history = [], lastTrades = 0, scanTimer = SCAN_INTERVAL;

// Scan countdown
setInterval(() => {
  scanTimer = Math.max(0, scanTimer - 1);
  document.getElementById('scanFill').style.width = ((SCAN_INTERVAL - scanTimer) / SCAN_INTERVAL * 100) + '%';
  document.getElementById('scanTime').textContent = scanTimer + 's';
  if (scanTimer === 0) scanTimer = SCAN_INTERVAL;
}, 1000);

function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast' + (type === 'sell' ? ' sell' : '') + ' show';
  setTimeout(() => t.classList.remove('show'), 4000);
}

function fmt(ts) {
  if (!ts) return '—';
  const d = new Date(ts), diff = Math.floor((Date.now() - d) / 1000);
  if (diff < 60) return diff + 's ago';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

function drawChart(hist) {
  const c = document.getElementById('chart'), ctx = c.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  c.width = c.offsetWidth * dpr; c.height = 80 * dpr;
  ctx.scale(dpr, dpr);
  const w = c.offsetWidth, h = 80;
  ctx.clearRect(0,0,w,h);
  if (hist.length < 2) return;
  const mn = Math.min(...hist)*0.998, mx = Math.max(...hist)*1.002, rng = mx-mn||.001;
  const pts = hist.map((v,i) => ({ x: i/(hist.length-1)*w, y: h-((v-mn)/rng)*(h-12)-6 }));
  const isUp = hist[hist.length-1] >= hist[0];
  const col = isUp ? '#00ff88' : '#ff2d55';
  const grad = ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0, isUp ? 'rgba(0,255,136,0.2)' : 'rgba(255,45,85,0.2)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.moveTo(pts[0].x,h); pts.forEach(p => ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,h); ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
  ctx.beginPath(); pts.forEach((p,i) => i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.strokeStyle=col; ctx.lineWidth=2; ctx.stroke();
  const lp = pts[pts.length-1];
  ctx.beginPath(); ctx.arc(lp.x,lp.y,3,0,Math.PI*2); ctx.fillStyle=col; ctx.fill();
}

function renderSlots(positions, signals) {
  const grid = document.getElementById('slotGrid');
  const entries = Object.entries(positions || {});
  document.getElementById('slotCount').textContent = entries.length + '/4';
  const slots = [];
  entries.forEach(([token, pos]) => {
    const sig = signals && signals[token];
    const currentPrice = sig ? sig.price : pos.entryPrice;
    const pctPnl = pos.entryPrice > 0 ? ((currentPrice - pos.entryPrice) / pos.entryPrice * 100) : 0;
    const z = sig ? sig.zScore : 0;
    slots.push(`<div class="slot active">
      <div class="slot-num">SLOT ${slots.length+1}</div>
      <div class="slot-token">${token}</div>
      <div class="slot-pnl ${pctPnl >= 0 ? 'up' : 'dn'}">${pctPnl >= 0 ? '+' : ''}${pctPnl.toFixed(2)}%</div>
      <div class="slot-detail">${pos.solSpent ? pos.solSpent.toFixed(4) + ' SOL in' : ''}</div>
      <div class="slot-z">z=${z.toFixed(2)}</div>
    </div>`);
  });
  for (let i = entries.length; i < 4; i++) {
    slots.push(`<div class="slot empty"><div class="empty-text">SLOT ${i+1}</div></div>`);
  }
  grid.innerHTML = slots.join('');
}

function renderSignals(signals, positions) {
  const list = document.getElementById('signalList');
  if (!signals || Object.keys(signals).length === 0) return;
  const held = Object.keys(positions || {});
  const entries = Object.entries(signals).sort((a,b) => b[1].compositeScore - a[1].compositeScore);
  list.innerHTML = entries.map(([name, s]) => {
    const isHeld = held.includes(name);
    const z = s.zScore || 0;
    const zClass = z < -0.5 ? 'z-neg' : z > 0.5 ? 'z-pos' : 'z-neu';
    const sc = s.compositeScore || 0;
    return `<div class="signal-row ${isHeld ? 'held' : sc > 0.005 ? 'best' : ''}">
      <div class="signal-name">${name}</div>
      <div class="signal-badges">
        <span class="badge ${zClass}">z=${z.toFixed(2)}</span>
        ${isHeld ? '<span class="badge held">HELD</span>' : ''}
      </div>
      <div class="signal-score ${sc > 0.005 ? 'up' : sc < -0.001 ? 'dn' : ''}">${(sc >= 0 ? '+' : '')}${(sc*100).toFixed(3)}</div>
    </div>`;
  }).join('');
}

function renderTrades(trades) {
  const list = document.getElementById('tradeList');
  if (!trades || trades.length === 0) { list.innerHTML = '<div style="font-family:\'JetBrains Mono\',monospace;font-size:.7rem;color:var(--muted);text-align:center;padding:20px;">No trades yet</div>'; return; }
  list.innerHTML = trades.slice(0,10).map(t => `
    <div class="trade-item">
      <div class="trade-left">
        <span class="trade-badge ${t.type.toLowerCase()}">${t.type}</span>
        <div>
          <div class="trade-token">${t.token}</div>
          <div class="trade-time">${fmt(t.time)}</div>
        </div>
      </div>
      <div class="trade-pnl ${t.pnl != null ? (t.pnl >= 0 ? 'up' : 'dn') : ''}">
        ${t.type === 'SELL' && t.pnl != null ? (t.pnl >= 0 ? '+' : '') + t.pnl.toFixed(4) + ' SOL' : t.solSpent ? '-' + t.solSpent.toFixed(4) + ' SOL' : ''}
      </div>
    </div>`).join('');
}

async function refresh() {
  try {
    const res = await fetch(BACKEND + '/api/state');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const s = await res.json();

    // Status
    const dot = document.getElementById('dot');
    dot.className = 'live-dot' + (s.running ? ' on' : '');
    document.getElementById('statusTxt').textContent = s.running ? 'LIVE' : 'OFFLINE';

    // Portfolio
    const total = s.portfolioSol || s.currentSol || 0;
    const start = s.startingSol || 1;
    const pnl = total - start, pnlPct = ((pnl/start)*100).toFixed(2);
    document.getElementById('portVal').innerHTML = total.toFixed(4) + '<span>SOL</span>';
    const pnlEl = document.getElementById('portPnl');
    pnlEl.textContent = (pnl >= 0 ? '+' : '') + pnl.toFixed(4) + ' SOL (' + (pnl >= 0 ? '+' : '') + pnlPct + '%) since start';
    pnlEl.className = 'port-pnl ' + (pnl >= 0 ? 'up' : 'dn');
    document.getElementById('liquidSol').textContent = (s.currentSol || 0).toFixed(4) + ' SOL';
    const posVal = total - (s.currentSol || 0);
    document.getElementById('inPositions').textContent = posVal.toFixed(4) + ' SOL';
    document.getElementById('totalPnl').textContent = (s.totalPnl >= 0 ? '+' : '') + (s.totalPnl || 0).toFixed(4);

    // Positions
    renderSlots(s.positions, s.signals);

    // Stats
    const trades = s.trades || [];
    const sells = trades.filter(t => t.type === 'SELL');
    const wins = sells.filter(t => t.pnl > 0);
    document.getElementById('tradeCount').textContent = trades.length;
    document.getElementById('winRate').textContent = sells.length > 0 ? Math.round(wins.length/sells.length*100) + '%' : '—';
    const best = sells.length > 0 ? Math.max(...sells.map(t => t.pnl)) : 0;
    document.getElementById('bestTrade').textContent = best > 0 ? '+' + best.toFixed(4) : '—';
    document.getElementById('lossStreak').textContent = s.consecutiveLosses || 0;

    // Chart
    if (total > 0) { history.push(total); if (history.length > 120) history.shift(); }
    drawChart(history);

    // Signals
    renderSignals(s.signals, s.positions);

    // Trades
    const newCount = trades.length;
    if (newCount > lastTrades && lastTrades > 0) {
      const latest = trades[0];
      if (latest.type === 'BUY') toast('🟢 BUY ' + latest.token + ' — ' + latest.solSpent.toFixed(4) + ' SOL');
      else if (latest.type === 'SELL') toast('🔴 SELL ' + latest.token + ' — ' + (latest.pnl >= 0 ? '+' : '') + latest.pnl.toFixed(4) + ' SOL', 'sell');
    }
    lastTrades = newCount;
    renderTrades(trades);

    // Log
    document.getElementById('logText').innerHTML = '<span class="log-ts">' + fmt(s.lastCheck) + '</span> ' + (s.lastAction || '—');

    scanTimer = SCAN_INTERVAL;
  } catch(e) {
    document.getElementById('statusTxt').textContent = 'OFFLINE';
    document.getElementById('dot').className = 'live-dot';
    document.getElementById('logText').innerHTML = 'Cannot reach bot: ' + e.message;
  }
}

refresh();
setInterval(refresh, REFRESH);
</script>
</body>
</html>
